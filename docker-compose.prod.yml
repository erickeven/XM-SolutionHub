# XM-SolutionHub 生产环境 Docker Compose
# 用法: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: xm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-xinmaowei}
    volumes:
      - xm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-xinmaowei}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: xm-redis
    volumes:
      - xm_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: xm-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    command: server /data --console-address ":9001"
    volumes:
      - xm_miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-xinmaowei}
    command: ['pnpm', '--filter', '@xm-solutionhub/server', 'prisma:migrate']
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  init-admin:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-xinmaowei}
    command: ['pnpm', '--filter', '@xm-solutionhub/server', 'admin:init']
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: xm-api
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: '3001'
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-xinmaowei}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      init-admin:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: xm-worker
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-xinmaowei}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
    command: ['node', 'server/dist/workers/knowledge-index.worker.js']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      init-admin:
        condition: service_completed_successfully
    healthcheck:
      disable: true
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: xm-nginx
    ports:
      - '${WEB_PORT:-8082}:80'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  xm_pgdata:
  xm_redisdata:
  xm_miniodata:
