name: xinmaowei-design-in

x-app-environment: &app-environment
  NODE_ENV: ${NODE_ENV:-development}
  PORT: 3000
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: redis://redis:6379
  S3_ENDPOINT: storage
  S3_PORT: 8333
  S3_USE_SSL: "false"
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET:-xinmaowei-files}
  ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
  FILE_TOKEN_SECRET: ${FILE_TOKEN_SECRET}

services:
  mysql:
    image: xinmaowei-design-in-mysql:9.7
    build:
      context: .
      target: db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xinmaowei}
      MYSQL_USER: ${MYSQL_USER:-xinmaowei}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci", "--log-bin=mysql-bin", "--binlog-format=ROW"]
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.2.7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  storage:
    image: xinmaowei-design-in-storage:4.29-sec1
    build:
      context: .
      target: storage
    command: ["mini", "-dir=/data"]
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-xinmaowei-files}
    volumes:
      - object-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8333"]
      interval: 10s
      timeout: 5s
      retries: 20

  storage-init:
    build:
      context: .
      target: api
    depends_on:
      storage:
        condition: service_healthy
    environment:
      S3_ENDPOINT: storage
      S3_PORT: 8333
      S3_USE_SSL: "false"
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-xinmaowei-files}
    command: ["node", "dist/storage-init.js"]
    restart: "no"

  api:
    build:
      context: .
      target: api
    environment: *app-environment
    depends_on:
      admin-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: build
    command: ["pnpm", "--filter", "@xinmaowei/server", "exec", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  admin-init:
    build:
      context: .
      target: build
    command: ["pnpm", "--filter", "@xinmaowei/server", "admin:init"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  worker:
    build:
      context: .
      target: api
    command: ["node", "dist/worker.js"]
    environment: *app-environment
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    ports:
      - "${APP_PORT:-8082}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  object-data:
